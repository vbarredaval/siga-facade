<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGA - Iniciar Sesión</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: #f2f4f5; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background-color: #2b2b2b; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header-logo { font-size: 22px; font-weight: bold; letter-spacing: 1px; }
        .menu-icon { border: 1px solid #555; padding: 2px 10px; border-radius: 4px; font-size: 20px; cursor: pointer; color: #fff;}
        
        main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .siga-title { font-size: 55px; color: #405565; margin: 25px 0 5px 0; font-weight: 800; letter-spacing: 1px; }
        .siga-subtitle { font-size: 14px; color: #206db2; margin-top: 0; font-weight: 600; margin-bottom: 30px; text-align: center; }
        
        .login-card { background: white; width: 100%; max-width: 320px; border-radius: 6px; padding: 30px 20px; box-shadow: 0px 2px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; border: 1px solid #eaeaea; }
        
        .input-group { width: 100%; margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; box-sizing: border-box; outline: none; transition: border-color 0.3s; }
        .input-group input:focus { border-color: #206db2; }
        
        .btn-login { background-color: #f0f0f0; border: 1px solid #ccc; color: #333; width: 100%; padding: 12px; font-size: 15px; border-radius: 4px; cursor: pointer; margin-top: 10px; font-weight: normal; transition: 0.3s; }
        .btn-login:hover { background-color: #e0e0e0; }
        
        .forgot-link { color: #206db2; text-decoration: none; font-size: 13px; margin-top: 25px; }
        
        .sectigo-badge { margin-top: 35px; border: 2px solid #00a651; color: #00a651; padding: 4px 12px; border-radius: 6px; font-weight: bold; font-size: 13px; display: flex; align-items: center; justify-content: center; }
        
        footer { background-color: #222; color: white; padding: 25px; text-align: center; margin-top: 20px; }
        .footer-text { font-size: 16px; font-family: 'Times New Roman', Times, serif; letter-spacing: 1px; }
    </style>
</head>
<body>

    <header>
        <div class="header-logo">UDEP</div>
        <div class="menu-icon">≡</div>
    </header>

    <main>
        <h1 class="siga-title">SIGA</h1>
        <h2 class="siga-subtitle">Sistema Integrado de Gestión Académica</h2>
        
        <div class="login-card">
            <div class="input-group">
                <!-- Campo para el DNI -->
                <input type="text" id="dni" placeholder="DNI" maxlength="8" autocomplete="off">
            </div>
            <div class="input-group">
                <!-- Campo para la contraseña -->
                <input type="password" id="password" placeholder="Contraseña">
            </div>
            
            <button class="btn-login" onclick="validarCredenciales()">Iniciar sesión</button>
            
            <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </div>

        <div class="sectigo-badge">
            <span style="font-size: 18px; margin-right: 5px;">S</span> SECURED BY SECTIGO
        </div>
    </main>

    <footer>
        <div class="footer-text">UNIVERSIDAD<br>DE PIURA</div>
    </footer>

    <script>
        // Esta función actúa como el "guardia" de tu página
        function validarCredenciales() {
            var dniIngresado = document.getElementById('dni').value;
            var passIngresada = document.getElementById('password').value;
            
            // Verificamos que coincida exactamente con lo que pediste
            if(dniIngresado === '78222137' && passIngresada === 'XYPLCN9067hf') {
                // Si la contraseña es correcta, lo mandamos a la página principal (la que haremos después)
                window.location.href = 'avisos.html'; 
            } else {
                // Si se equivoca, le sale un error realista
                alert('Credenciales incorrectas. Por favor, verifique su DNI y contraseña.');
            }
        }
    </script>
</body>
</html>
